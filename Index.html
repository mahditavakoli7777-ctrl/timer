<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #080808;
  --bg1:      #101010;
  --bg2:      #161616;
  --bg3:      #1E1E1E;
  --border:   #1F1F1F;
  --border2:  #2A2A2A;
  --text:     #FFFFFF;
  --text2:    #A0A0A0;
  --text3:    #555555;
  --pill-bg:  #1A1A1A;
  --pill-border: #2A2A2A;
  --btn-bg:   #FFFFFF;
  --btn-text: #000000;
  --running:  #FFFFFF;
  --green:    #3ECF8E;
  --red:      #FF4D4D;
  --amber:    #F59E0B;
  --r:        14px;
  --r-sm:     9px;
}

.light {
  --bg:       #F5F5F5;
  --bg1:      #FFFFFF;
  --bg2:      #F0F0F0;
  --bg3:      #E8E8E8;
  --border:   #E0E0E0;
  --border2:  #D0D0D0;
  --text:     #0A0A0A;
  --text2:    #555555;
  --text3:    #A0A0A0;
  --pill-bg:  #EFEFEF;
  --pill-border: #DCDCDC;
  --btn-bg:   #0A0A0A;
  --btn-text: #FFFFFF;
  --running:  #0A0A0A;
  --green:    #16A34A;
  --red:      #DC2626;
  --amber:    #D97706;
}

html { font-size: 14px; -webkit-font-smoothing: antialiased; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  min-height: 100vh;
  line-height: 1.5;
}

::-webkit-scrollbar { width: 0; }

.shell { max-width: 480px; margin: 0 auto; padding-bottom: 90px; min-height: 100vh; }

/* ── Header ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text3); transition: background .3s;
}
.header-dot.live { background: var(--green); animation: breathe 2s ease-in-out infinite; }
@keyframes breathe { 0%,100%{opacity:1} 50%{opacity:.4} }
.header-title { font-size: 13px; font-weight: 600; letter-spacing: -.2px; }
.header-right { display: flex; gap: 6px; }

/* ── Pill Button ── */
.pill {
  background: var(--pill-bg);
  border: 1px solid var(--pill-border);
  border-radius: 20px;
  padding: 5px 12px;
  color: var(--text2);
  font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all .15s;
  font-family: inherit;
  letter-spacing: .2px;
  white-space: nowrap;
}
.pill:hover { border-color: var(--text3); color: var(--text); }
.pill.active { background: var(--btn-bg); color: var(--btn-text); border-color: var(--btn-bg); }

/* ── Tab bar ── */
.tabs {
  display: flex; gap: 2px; padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.tab-btn {
  padding: 6px 14px; border-radius: 20px; border: none;
  background: none; color: var(--text3); font-size: 12px;
  font-weight: 500; cursor: pointer; transition: all .15s;
  font-family: inherit; letter-spacing: .2px;
}
.tab-btn:hover { color: var(--text2); }
.tab-btn.active { background: var(--pill-bg); color: var(--text); border: 1px solid var(--pill-border); }

/* ── Content ── */
.content { padding: 0 16px; }
.section { padding-top: 20px; }

/* ── Category scroll ── */
.cats {
  display: flex; gap: 6px; overflow-x: auto;
  padding: 12px 16px 0; scrollbar-width: none;
}
.cats::-webkit-scrollbar { display: none; }

/* ── Timer Card ── */
.t-card {
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin: 10px 16px 0;
  overflow: hidden;
  transition: border-color .2s;
  cursor: grab;
}
.t-card.live { border-color: var(--border2); }
.t-card.dragging { opacity: .4; cursor: grabbing; }
.t-card.drag-over { border-color: var(--text3); }

/* Card header row */
.t-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px;
}
.t-meta { display: flex; align-items: center; gap: 9px; }
.t-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: #000; display: grid; place-items: center;
  font-size: 16px; flex-shrink: 0;
  filter: grayscale(1) brightness(2) contrast(0.85);
}
.t-name { font-size: 13px; font-weight: 600; letter-spacing: -.2px; }
.t-tags { display: flex; gap: 4px; margin-top: 2px; flex-wrap: wrap; }
.t-tag {
  font-size: 10px; font-weight: 500; color: var(--text3);
  background: var(--bg2); border: 1px solid var(--border);
  padding: 1px 7px; border-radius: 4px; letter-spacing: .2px;
}
.t-tag.streak { color: var(--amber); border-color: rgba(245,158,11,.3); background: rgba(245,158,11,.08); }
.t-more {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 18px; padding: 0 4px;
  line-height: 1; transition: color .15s;
}
.t-more:hover { color: var(--text); }
.t-pin {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 14px; padding: 0 4px;
  line-height: 1; transition: color .15s;
}
.t-pin.pinned { color: var(--amber); }

/* Big time */
.t-time-row { padding: 4px 16px 16px; }
.t-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 52px; font-weight: 600;
  letter-spacing: -3px; line-height: 1;
  color: var(--text); transition: color .2s;
}
.t-time.live { color: var(--running); }
.t-sub {
  font-size: 10px; color: var(--text3); font-weight: 500;
  margin-top: 4px; letter-spacing: .5px; text-transform: uppercase;
  display: flex; align-items: center; gap: 5px;
}
.live-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--green);
  animation: breathe 1.5s ease-in-out infinite; display: none;
}
.live .live-dot { display: block; }

/* Lap times */
.t-laps { padding: 0 16px 10px; display: none; }
.t-laps.show { display: block; }
.lap-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 11px;
}
.lap-row:last-child { border-bottom: none; }
.lap-label { color: var(--text3); }
.lap-time { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--text2); }

/* Progress bar */
.t-prog-wrap { padding: 0 16px; margin-bottom: 12px; }
.t-prog-track {
  height: 2px; background: var(--bg3); border-radius: 2px; overflow: hidden;
}
.t-prog-fill {
  height: 100%; background: var(--text); border-radius: 2px;
  transition: width .5s ease;
}

/* Controls */
.t-controls {
  display: flex; align-items: center; gap: 8px;
  padding: 0 16px 14px;
}
.btn-play {
  display: flex; align-items: center; gap: 7px;
  background: var(--btn-bg); color: var(--btn-text);
  border: none; border-radius: 20px;
  padding: 8px 18px; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: opacity .15s;
  font-family: inherit; letter-spacing: .2px;
}
.btn-play:hover { opacity: .85; }
.btn-ghost {
  background: none; border: 1px solid var(--border2);
  border-radius: 20px; padding: 8px 14px;
  color: var(--text2); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all .15s; font-family: inherit;
}
.btn-ghost:hover { border-color: var(--text3); color: var(--text); }

/* Goal strip */
.t-goal {
  border-top: 1px solid var(--border);
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.t-goal-info { display: flex; flex-direction: column; gap: 1px; }
.t-goal-label { font-size: 10px; color: var(--text3); font-weight: 500; letter-spacing: .3px; text-transform: uppercase; }
.t-goal-val { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; color: var(--text2); }
.t-goal-val.met { color: var(--green); }
.t-goal-bar { flex: 1; }

/* ── Add button ── */
.add-card {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin: 10px 16px 0;
  padding: 14px;
  background: none; border: 1px dashed var(--border2);
  border-radius: var(--r); cursor: pointer;
  color: var(--text3); font-size: 12px; font-weight: 500;
  transition: all .2s; font-family: inherit; letter-spacing: .2px;
  width: calc(100% - 32px);
}
.add-card:hover { border-color: var(--text3); color: var(--text2); }

/* ── Pomodoro block ── */
.pomo-wrap { margin: 16px 16px 0; }
.pomo-block {
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px;
}
.pomo-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.pomo-left { display: flex; align-items: center; gap: 8px; }
.pomo-title { font-size: 13px; font-weight: 600; }
.pomo-badge {
  font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px;
  background: var(--bg2); color: var(--text3); letter-spacing: .3px;
}
.pomo-cycle-wrap { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.pomo-cycle-label { font-size: 10px; color: var(--text3); font-weight: 500; letter-spacing: .3px; text-transform: uppercase; flex:1; }
.pomo-cycle-dots { display: flex; gap: 4px; }
.pomo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--bg3); transition: background .3s; }
.pomo-dot.done { background: var(--green); }
.pomo-dot.active { background: var(--red); animation: breathe 1.5s ease-in-out infinite; }
.pomo-cycle-ctrl { display: flex; gap: 4px; align-items: center; }
.pomo-cycle-btn {
  width: 22px; height: 22px; border-radius: 6px; border: 1px solid var(--border2);
  background: none; color: var(--text2); font-size: 13px; cursor: pointer;
  display: grid; place-items: center; transition: all .15s;
}
.pomo-cycle-btn:hover { border-color: var(--text3); color: var(--text); }
.pomo-cycle-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; min-width: 16px; text-align: center; }
.pomo-ring-wrap {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 14px; position: relative;
}
.pomo-ring-svg { display: block; }
.pomo-ring-center {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.pomo-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 34px; font-weight: 600; letter-spacing: -2px;
  color: var(--red); text-align: center; line-height: 1;
}
.pomo-ring-label { font-size: 10px; color: var(--text3); letter-spacing:.4px; text-transform:uppercase; }
.pomo-btns { display: flex; gap: 6px; }
.pomo-btn {
  flex: 1; padding: 8px 0;
  background: none; border: 1px solid var(--border2); border-radius: 8px;
  color: var(--text2); font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all .15s; font-family: inherit;
  letter-spacing: .2px;
}
.pomo-btn:hover { border-color: var(--text3); color: var(--text); }
.pomo-controls { display: flex; gap: 6px; }
.pomo-pause {
  flex: 1; background: none; border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text2); font-size: 11px; font-weight: 600;
  padding: 8px 0; cursor: pointer; font-family: inherit;
  transition: all .15s;
}
.pomo-pause:hover { border-color: var(--text3); color: var(--text); }
.pomo-stop {
  background: none; border: 1px solid rgba(255,77,77,.25);
  border-radius: 8px; color: var(--red); font-size: 11px; font-weight: 600;
  padding: 8px 20px; cursor: pointer; font-family: inherit;
  transition: background .15s;
}
.pomo-stop:hover { background: rgba(255,77,77,.08); }

/* Ambient sound toggle */
.ambient-row {
  margin-top: 12px; display: flex; align-items: center; gap: 8px;
  padding-top: 12px; border-top: 1px solid var(--border);
}
.ambient-label { font-size: 10px; color: var(--text3); font-weight: 500; letter-spacing: .3px; text-transform: uppercase; flex: 1; }
.ambient-btns { display: flex; gap: 5px; }
.amb-btn {
  padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border2);
  background: none; color: var(--text3); font-size: 11px; cursor: pointer;
  transition: all .15s; font-family: inherit;
}
.amb-btn:hover { border-color: var(--text3); color: var(--text); }
.amb-btn.on { border-color: var(--text3); color: var(--text); background: var(--pill-bg); }

/* ── Section title ── */
.sec-title {
  font-size: 11px; font-weight: 600; color: var(--text3);
  letter-spacing: .5px; text-transform: uppercase;
  padding: 20px 16px 12px;
}
.sec-title-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 16px 12px;
}
.sec-title-row .sec-title { padding: 0; }

/* ── History ── */
.hist-item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  transition: background .1s, transform .2s;
  position: relative; overflow: hidden;
}
.hist-item:last-child { border-bottom: none; }
.hist-item:hover { background: var(--bg1); }
.hist-icon { font-size: 16px; flex-shrink: 0; }
.hist-info { flex: 1; }
.hist-name { font-size: 12px; font-weight: 500; }
.hist-note { font-size: 10px; color: var(--text3); margin-top: 2px; font-style: italic; }
.hist-date { font-size: 10px; color: var(--text3); margin-top: 1px; }
.hist-dur {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 600; color: var(--text2); flex-shrink: 0;
}
.tick-btn {
  width: 24px; height: 24px; border-radius: 6px;
  border: 1px solid var(--border2); background: none;
  color: var(--text3); cursor: pointer; font-size: 12px;
  transition: all .15s; display: grid; place-items: center; flex-shrink: 0;
}
.tick-btn.done {
  background: rgba(62,207,142,.1); border-color: rgba(62,207,142,.3);
  color: var(--green);
}
.del-btn {
  width: 24px; height: 24px; border-radius: 6px;
  border: 1px solid rgba(255,77,77,.2); background: none;
  color: var(--red); cursor: pointer; font-size: 11px;
  transition: all .15s; display: grid; place-items: center; flex-shrink: 0;
  opacity: 0;
}
.hist-item:hover .del-btn { opacity: 1; }
.hist-list {
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: var(--r); margin: 0 16px; overflow: hidden;
}

/* Export row */
.export-row {
  display: flex; gap: 6px; padding: 0 16px 12px;
}

/* ── Stats ── */
.stats-range-row {
  display: flex; gap: 5px; padding: 0 16px 4px;
}
.range-btn {
  padding: 5px 12px; border-radius: 7px; border: 1px solid var(--border2);
  background: none; color: var(--text3); font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all .15s; font-family: inherit;
}
.range-btn.on { border-color: var(--text3); color: var(--text); background: var(--pill-bg); }
.chart-wrap {
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px; margin: 0 16px;
}
.chart-bars-row {
  display: flex; align-items: flex-end; justify-content: space-between;
  height: 80px; gap: 6px; margin-bottom: 8px;
}
.chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
.chart-bar {
  width: 100%; border-radius: 4px 4px 0 0; min-height: 3px;
  background: var(--bg3); transition: height .4s;
}
.chart-bar.today { background: var(--text); }
.chart-day { font-size: 10px; color: var(--text3); font-weight: 500; }

.stats-row-cards {
  display: flex; gap: 10px; padding: 0 16px; margin-top: 10px;
}
.stat-mini-card {
  flex: 1; background: var(--bg1); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 12px 14px;
}
.stat-mini-label { font-size: 10px; color: var(--text3); font-weight: 500; letter-spacing: .3px; text-transform: uppercase; margin-bottom: 4px; }
.stat-mini-val { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; }

.total-block {
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px 18px; margin: 10px 16px 0;
  display: flex; align-items: baseline; gap: 10px;
}
.total-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 30px; font-weight: 600; letter-spacing: -1px;
}
.total-label { font-size: 11px; color: var(--text3); font-weight: 500; letter-spacing: .3px; text-transform: uppercase; }

.stat-row {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 16px; border-bottom: 1px solid var(--border);
}
.stat-row:last-child { border-bottom: none; }
.stat-icon { font-size: 14px; flex-shrink: 0; }
.stat-name { font-size: 12px; font-weight: 500; flex: 1; }
.stat-dur {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 600; color: var(--text2);
}
.stat-mini-bar { width: 60px; height: 3px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.stat-mini-fill { height: 100%; background: var(--text); border-radius: 3px; transition: width .4s; }
.stat-list {
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: var(--r); margin: 10px 16px 0; overflow: hidden;
}

/* ── Goals ── */
.goal-card {
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: var(--r); margin: 0 16px; overflow: hidden;
}
.goal-card + .goal-card { margin-top: 10px; }
.goal-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.goal-icon { font-size: 16px; }
.goal-name { font-size: 13px; font-weight: 600; flex: 1; }
.goal-status { font-size: 11px; font-weight: 600; color: var(--green); }
.streak-badge {
  font-size: 10px; font-weight: 700; color: var(--amber);
  background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.25);
  border-radius: 5px; padding: 1px 7px; letter-spacing: .2px;
}
.goal-body { padding: 12px 16px; }
.goal-custom-row {
  display: flex; gap: 6px; align-items: center; margin-bottom: 12px;
}
.goal-custom-inp {
  flex: 1; background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 8px; padding: 7px 10px; color: var(--text);
  font-size: 12px; font-family: 'JetBrains Mono', monospace; outline: none;
  transition: border-color .15s; min-width: 0;
}
.goal-custom-inp:focus { border-color: var(--text3); }
.goal-custom-set {
  padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border2);
  background: none; color: var(--text2); font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all .15s; font-family: inherit; white-space: nowrap;
}
.goal-custom-set:hover { border-color: var(--text3); color: var(--text); background: var(--pill-bg); }
.goal-prog-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.goal-prog-label { font-size: 10px; color: var(--text3); font-weight: 500; letter-spacing: .3px; text-transform: uppercase; }
.goal-prog-pct { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; }
.goal-prog-pct.met { color: var(--green); }
.goal-bar { height: 2px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-bottom: 12px; }
.goal-bar-fill { height: 100%; background: var(--text); border-radius: 2px; transition: width .5s; }
.goal-bar-fill.met { background: var(--green); }
.remind-row { display: flex; align-items: center; gap: 8px; }
.remind-label { font-size: 10px; color: var(--text3); font-weight: 500; letter-spacing: .3px; text-transform: uppercase; }
.time-inp {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 7px; padding: 5px 9px; color: var(--text);
  font-size: 12px; font-family: inherit; outline: none;
  transition: border-color .15s; flex: 1;
}
.time-inp:focus { border-color: var(--text3); }
.x-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 12px; }
.x-btn:hover { color: var(--red); }

/* ── Notif banner ── */
.notif-bar {
  margin: 10px 16px 0;
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.notif-text { font-size: 11px; color: var(--text3); }

/* ── Empty ── */
.empty { padding: 50px 20px; text-align: center; color: var(--text3); }
.empty-ico { font-size: 36px; margin-bottom: 10px; }
.empty-txt { font-size: 12px; letter-spacing: .3px; }

/* ── Tab panes ── */
.pane { display: none; }
.pane.active { display: block; }

/* ── Session Note Modal ── */
.note-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
  z-index: 300; align-items: flex-end; justify-content: center;
}
.note-overlay.open { display: flex; }
.note-modal {
  background: var(--bg1); border-radius: 20px 20px 0 0;
  border: 1px solid var(--border2); border-bottom: none;
  width: 100%; max-width: 480px; padding: 20px;
}
.note-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.note-sub { font-size: 11px; color: var(--text3); margin-bottom: 14px; }
.note-input {
  width: 100%; background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 10px 12px; color: var(--text);
  font-size: 13px; font-family: inherit; outline: none; resize: none;
  transition: border-color .15s; height: 80px;
}
.note-input:focus { border-color: var(--text3); }
.note-footer { display: flex; gap: 8px; margin-top: 12px; }
.note-skip {
  flex: 1; padding: 11px; background: none; border: 1px solid var(--border2);
  border-radius: 10px; color: var(--text2); font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.note-skip:hover { border-color: var(--text3); color: var(--text); }
.note-save {
  flex: 2; padding: 11px; background: var(--btn-bg); color: var(--btn-text);
  border: none; border-radius: 10px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: opacity .15s;
}
.note-save:hover { opacity: .85; }

/* ── Modal ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
  z-index: 200; align-items: flex-end;
}
.overlay.open { display: flex; }
.modal {
  background: var(--bg1); border-radius: 20px 20px 0 0;
  border: 1px solid var(--border2); border-bottom: none;
  width: 100%; max-width: 480px; margin: 0 auto;
  padding: 20px; max-height: 88vh; overflow-y: auto;
}
.modal-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--border2); margin: 0 auto 18px;
}
.modal-title { font-size: 15px; font-weight: 700; letter-spacing: -.3px; margin-bottom: 18px; }
.m-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 7px; }
.m-field { margin-bottom: 16px; }
.m-input {
  width: 100%; background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 10px 12px; color: var(--text);
  font-size: 13px; font-family: inherit; outline: none; transition: border-color .15s;
}
.m-input:focus { border-color: var(--text3); }
.m-row { display: flex; gap: 6px; }
.m-tog {
  flex: 1; padding: 8px 0; border-radius: 8px; border: 1px solid var(--border2);
  background: none; color: var(--text3); font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all .15s; font-family: inherit;
}
.m-tog.on { background: var(--pill-bg); color: var(--text); border-color: var(--text3); }
.emoji-grid { display: flex; gap: 6px; flex-wrap: wrap; }
.e-btn {
  width: 36px; height: 36px; border-radius: 8px;
  border: 1px solid var(--border); background: #000;
  font-size: 18px; cursor: pointer; display: grid; place-items: center;
  transition: all .15s; filter: grayscale(1) brightness(10);
}
.e-btn.on { border-color: var(--text3); background: #111; box-shadow: 0 0 0 1px var(--text3); }
.light .e-btn { background: #000; filter: grayscale(1) brightness(10); }
.light .e-btn.on { background: #111; }
.dur-presets { display: flex; gap: 5px; flex-wrap: wrap; }
.dur-btn {
  padding: 6px 11px; border-radius: 7px; border: 1px solid var(--border2);
  background: none; color: var(--text3); font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all .15s; font-family: 'JetBrains Mono', monospace;
}
.dur-btn.on { border-color: var(--text3); color: var(--text); background: var(--pill-bg); }
.cat-presets { display: flex; gap: 5px; flex-wrap: wrap; }
.cat-btn {
  padding: 6px 11px; border-radius: 7px; border: 1px solid var(--border2);
  background: none; color: var(--text3); font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all .15s; font-family: inherit;
}
.cat-btn.on { border-color: var(--text3); color: var(--text); background: var(--pill-bg); }
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.m-footer { display: flex; gap: 8px; padding-top: 4px; }
.m-save {
  flex: 2; padding: 12px; background: var(--btn-bg); color: var(--btn-text);
  border: none; border-radius: 10px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: opacity .15s;
}
.m-save:hover { opacity: .85; }
.m-cancel {
  flex: 1; padding: 12px; background: none; border: 1px solid var(--border2);
  border-radius: 10px; color: var(--text2); font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.m-cancel:hover { border-color: var(--text3); color: var(--text); }
.m-del {
  padding: 12px 14px; background: none; border: 1px solid rgba(255,77,77,.25);
  border-radius: 10px; color: var(--red); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: background .15s;
}
.m-del:hover { background: rgba(255,77,77,.08); }

/* Keyboard shortcut hint */
.kb-hint { font-size: 10px; color: var(--text3); letter-spacing: .3px; margin-top: 2px; }
kbd {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 4px; padding: 1px 5px; color: var(--text2);
}
</style>
</head>
<body>

<div class="shell">

  <!-- ─── Header ─── -->

    </div>
  </header>

  <!-- ─── Tabs ─── -->
  <nav class="tabs">

    <button class="tab-btn" onclick="switchTab('history',this)" data-fa="تاریخچه" data-en="History">تاریخچه</button>

  <!-- ══════════════════ TIMERS PANE ══════════════════ -->

    <div class="notif-bar" id="notifBar" style="display:none">
      <span class="notif-text" data-fa="برای اعلان پایان تایمر مجوز بدید" data-en="Allow notifications for timer alerts">برای اعلان پایان تایمر مجوز بدید</span>
      <button class="pill" onclick="askNotif()" data-fa="فعال‌کردن" data-en="Enable">فعال‌کردن</button>
    </div>

    <div id="cardList"></div>

    <button class="add-card" onclick="openAdd()">
      <span>+</span>
      <span data-fa="تایمر جدید" data-en="New timer">تایمر جدید</span>
    </button>

    <!-- Pomodoro -->
    <div class="pomo-wrap">
      <div class="pomo-block">
        <div class="pomo-header">
          <div class="pomo-left">
            <span style="font-size:16px">🍅</span>
            <span class="pomo-title" data-fa="پومودورو" data-en="Pomodoro">پومودورو</span>
          </div>
          <span class="pomo-badge" id="pomoBadge" data-fa="آماده" data-en="Ready">آماده</span>
        </div>
        <div class="pomo-cycle-wrap">
          <span class="pomo-cycle-label" data-fa="چرخه‌ها" data-en="Cycles">چرخه‌ها</span>
          <div class="pomo-cycle-ctrl">
            <button class="pomo-cycle-btn" onclick="adjPomoCycle(-1)">−</button>
            <span class="pomo-cycle-num" id="pomoCycleNum">4</span>
            <button class="pomo-cycle-btn" onclick="adjPomoCycle(1)">+</button>
          </div>

        </div>
        <div class="pomo-ring-wrap" id="pomoRingWrap">
          <svg class="pomo-ring-svg" width="140" height="140" viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="58" fill="none" stroke="var(--bg3)" stroke-width="6"/>
            <circle id="pomoRingFill" cx="70" cy="70" r="58" fill="none" stroke="var(--red)" stroke-width="6"
              stroke-dasharray="364.4" stroke-dashoffset="0"
              stroke-linecap="round" transform="rotate(-90 70 70)"
              style="transition: stroke-dashoffset 0.5s ease;"/>
          </svg>
          <div class="pomo-ring-center">
            <div class="pomo-time" id="pomoTime">25:00</div>
            <div class="pomo-ring-label" id="pomoRingLabel">آماده</div>
          </div>
        </div>
        <div id="pomoStart">
          <div class="pomo-btns">
            <button class="pomo-btn" onclick="startPomo('work')" data-fa="کار · ۲۵ دقیقه" data-en="Work · 25m">کار · ۲۵ دقیقه</button>
            <button class="pomo-btn" onclick="startPomo('short')" data-fa="استراحت · ۵ دقیقه" data-en="Break · 5m">استراحت · ۵ دقیقه</button>
            <button class="pomo-btn" onclick="startPomo('long')" data-fa="استراحت طولانی · ۱۵ دقیقه" data-en="Long break · 15m">استراحت طولانی · ۱۵ دقیقه</button>
          </div>
        </div>
        <div id="pomoRunning" style="display:none">
          <div class="pomo-controls">
            <button class="pomo-pause" id="pomoPauseBtn" onclick="togglePomoPause()">⏸ <span data-fa="مکث" data-en="Pause">مکث</span></button>
            <button class="pomo-stop" onclick="stopPomo()" data-fa="توقف" data-en="Stop">توقف</button>
          </div>
        </div>
        <div class="ambient-row">
          <span class="ambient-label" data-fa="صدای محیطی" data-en="Ambient">صدای محیطی</span>
          <div class="ambient-btns" id="ambientBtns" style="flex-wrap:wrap;gap:5px">
            <button class="amb-btn" onclick="setAmbient('rain')" data-key="rain" title="باران">🌧</button>
            <button class="amb-btn" onclick="setAmbient('storm')" data-key="storm" title="طوفان">⛈</button>
            <button class="amb-btn" onclick="setAmbient('wind')" data-key="wind" title="باد">🌬</button>
            <button class="amb-btn" onclick="setAmbient('white')" data-key="white" title="وایت نویز">〰</button>
            <button class="amb-btn" onclick="setAmbient('brown')" data-key="brown" title="براون نویز">🟫</button>
            <button class="amb-btn" onclick="setAmbient('fire')" data-key="fire" title="آتش">🔥</button>
            <button class="amb-btn" onclick="setAmbient('river')" data-key="river" title="رودخانه">🏞</button>
            <button class="amb-btn" onclick="setAmbient('cave')" data-key="cave" title="غار">🌑</button>
            <button class="amb-btn" onclick="setAmbient('coffee')" data-key="coffee" title="کافه">☕</button>
            <button class="amb-btn on" onclick="setAmbient('off')" data-key="off" title="خاموش">✕</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════ HISTORY PANE ══════════════════ -->
  <div class="pane" id="pane-history">
    <div class="sec-title-row">
      <span class="sec-title" data-fa="جلسات اخیر" data-en="Recent sessions">جلسات اخیر</span>
      <button class="pill" onclick="exportData()" data-fa="دانلود CSV" data-en="Download CSV">دانلود CSV</button>
    </div>
    <div class="hist-list" id="histList"></div>
  </div>

  <!-- ══════════════════ STATS PANE ══════════════════ -->
  <div class="pane" id="pane-stats">
    <div class="sec-title" data-fa="بازه زمانی" data-en="Time range">بازه زمانی</div>
    <div class="stats-range-row">
      <button class="range-btn on" onclick="setRange('week',this)" data-fa="۷ روز" data-en="7 days">۷ روز</button>
      <button class="range-btn" onclick="setRange('month',this)" data-fa="۳۰ روز" data-en="30 days">۳۰ روز</button>
      <button class="range-btn" onclick="setRange('all',this)" data-fa="همیشه" data-en="All time">همیشه</button>
    </div>
    <div class="sec-title" id="chartLabel" data-fa="هفت روز گذشته" data-en="Last 7 days">هفت روز گذشته</div>

      <div class="chart-bars-row" id="chartBars"></div>
      <div class="chart-bars-row" id="chartDays" style="height:auto"></div>

        <div class="stat-mini-val" id="bestDayVal">–</div>
      </div>
      <div class="stat-mini-card">
        <div class="stat-mini-label" data-fa="میانگین روزانه" data-en="Daily avg">میانگین روزانه</div>

      </div>

      <span class="total-label" data-fa="مجموع ثبت‌شده" data-en="Total recorded">مجموع ثبت‌شده</span>
    </div>
    <div class="sec-title" data-fa="امروز" data-en="Today">امروز</div>

  <!-- ══════════════════ GOALS PANE ══════════════════ -->
  <div class="pane" id="pane-goals">
    <div class="sec-title" data-fa="هدف روزانه" data-en="Daily goals">هدف روزانه</div>
    <div id="goalList"></div>
  </div>
</div>

<!-- ─── Timer Modal ─── -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">تایمر جدید</div>

    <div class="m-field">
      <div class="m-label" data-fa="ایموجی" data-en="Emoji">ایموجی</div>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>
    <div class="m-field">
      <div class="m-label" data-fa="نام فارسی" data-en="Name (Persian)">نام فارسی</div>
      <input class="m-input" id="mFa" placeholder="مثال: مطالعه">

<script>
// ─── Data ─────────────────────────────────────────────────────────────────────
let lang = 'fa';
let dark = true;
let statsRange = 'week';
let pomoCycles = 4;
let pomoCycleDone = 0;
let ambientActive = 'off';
let ambientCtx = null;
let ambientNode = null;
let ambientNodes = [];

// localStorage keys
const LS_TIMERS   = 'tm_timers';
const LS_HISTORY  = 'tm_history';
const LS_GOALS    = 'tm_goals';
const LS_REMIND   = 'tm_reminders';
const LS_ORDER    = 'tm_order';
const LS_PINS     = 'tm_pins';
const LS_STREAKS  = 'tm_streaks';

function loadLS(key, def){ try{ const v=localStorage.getItem(key); return v?JSON.parse(v):def; }catch(e){return def;} }
function saveLS(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} }

let timers    = loadLS(LS_TIMERS, null);
if(!timers) timers = [
  {id:uid(),name:'فوکوس کار',  nameEn:'Work Focus', type:'countdown',totalSec:1500,cat:'کار',    goalSec:7200,emoji:'💼'},
  {id:uid(),name:'مطالعه',     nameEn:'Study',      type:'countdown',totalSec:2700,cat:'تحصیل', goalSec:5400,emoji:'📚'},
  {id:uid(),name:'ورزش',       nameEn:'Workout',    type:'stopwatch', totalSec:0,  cat:'ورزش',   goalSec:3600,emoji:'🏃'},
];

let history   = loadLS(LS_HISTORY, []);
let goals     = loadLS(LS_GOALS, {});
let reminders = loadLS(LS_REMIND, {});
let timerOrder= loadLS(LS_ORDER, null);
let pins      = loadLS(LS_PINS, {});
let streaks   = loadLS(LS_STREAKS, {});

let running = {};
let filterCat = 'all';
let pom = null;
let mMode = 'add', mData = null;
let pendingNote = null; // {tid, durSec}
let dragSrc = null;

const CATS_FA = ['کار','تحصیل','ورزش','استراحت','خلاقیت','شخصی'];
const CATS_EN = ['Work','Study','Sport','Rest','Creative','Personal'];
const EMOJIS  = ['⏱','💼','📚','🏃','🎨','🧘','🎵','💻','✍️','🍳','🌿','🎯','🔬','🏋️','🎤'];
const DURS    = [300,600,900,1500,1800,2700,3600,5400];
const POMO    = {work:1500, short:300, long:900};

function uid(){ return Math.random().toString(36).slice(2,9); }
function pad(n){ return String(n).padStart(2,'0'); }
function fmt(s){ s=Math.round(Math.abs(s)); const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; return h?`${pad(h)}:${pad(m)}:${pad(sec)}`:`${pad(m)}:${pad(sec)}`; }
function today(){ return new Date().toISOString().slice(0,10); }
function t(fa,en){ return lang==='fa'?fa:en; }

// ─── Sorted timer list ────────────────────────────────────────────────────────
function sortedTimers(){
  let list = [...timers];
  // pins first
  list.sort((a,b)=>{
    const pa = pins[a.id]?1:0, pb = pins[b.id]?1:0;
    return pb - pa;
  });
  return list;
}

// ─── Running ──────────────────────────────────────────────────────────────────
function elapsedMs(id){ return running[id] ? running[id].base + (Date.now()-running[id].started) : (running[id+'_paused']||0); }
function isLive(id){ return !!(running[id] && running[id].started); }
function isPaused(id){ return !!(running[id+'_paused'] !== undefined && !running[id]); }

function startT(id){
  // Resume from pause if paused
  const pausedBase = running[id+'_paused'];
  if(pausedBase !== undefined){
    running[id] = {started: Date.now(), base: pausedBase};
    delete running[id+'_paused'];
  } else {
    // Fresh start, keep existing elapsed if any (resume)
    const base = (running[id] && !running[id].started) ? running[id].base : 0;
    running[id] = {started:Date.now(), base};
  }
  renderCards();
  saveLS(LS_TIMERS, timers);
}

function pauseT(id){
  if(!running[id]) return;
  const el = elapsedMs(id);
  // save elapsed as paused state – does NOT save to history yet
  running[id+'_paused'] = el;
  delete running[id];
  renderCards();
}

function stopT(id){
  // Stop = pause + open note = save session
  const el = isLive(id) ? elapsedMs(id) : (running[id+'_paused']||0);
  if(el > 5000){
    pendingNote = {tid: id, durSec: el/1000};
    openNoteModal(id, el/1000);
  }
  delete running[id];
  delete running[id+'_paused'];
  renderCards();
}

function resetT(id){
  delete running[id];
  delete running[id+'_paused'];
  renderCards();
}

function saveS(tid, durSec, note){
  if(durSec<5) return;
  const tm = timers.find(t=>t.id===tid); if(!tm) return;
  history.unshift({id:uid(),tid,name:tm.name,nameEn:tm.nameEn,cat:tm.cat,emoji:tm.emoji,dur:Math.round(durSec),date:today(),done:false,note:note||''});
  saveLS(LS_HISTORY, history);
  updateStreaks(tid);
  renderHistory(); renderStats(); renderGoals();
}

// ─── Streaks ─────────────────────────────────────────────────────────────────
function updateStreaks(tid){
  const gs = goals[tid] || (timers.find(t=>t.id===tid)||{}).goalSec || 3600;
  const todayTot = history.filter(h=>h.tid===tid && h.date===today()).reduce((a,h)=>a+h.dur,0);
  if(todayTot >= gs){
    const s = streaks[tid] || {count:0, lastDay:''};
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yStr = yesterday.toISOString().slice(0,10);
    if(s.lastDay === yStr) s.count++;
    else if(s.lastDay !== today()) s.count = 1;
    s.lastDay = today();
    streaks[tid] = s;
    saveLS(LS_STREAKS, streaks);
  }
}

// ─── Laps ─────────────────────────────────────────────────────────────────────
let laps = {}; // id → [{time, split}]
function addLap(id){
  if(!isLive(id)) return;
  const el = elapsedMs(id)/1000;
  if(!laps[id]) laps[id]=[];
  const prev = laps[id].length ? laps[id][laps[id].length-1].time : 0;
  laps[id].push({time: el, split: el - prev});
  refreshCard(timers.find(tm=>tm.id===id));
}

// ─── Tick ─────────────────────────────────────────────────────────────────────
setInterval(()=>{
  let anyLive = Object.keys(running).filter(k=>!k.endsWith('_paused')).length > 0;

  timers.forEach(tm=>{
    if(!running[tm.id]) return;
    const el = elapsedMs(tm.id);
    if(tm.type==='countdown' && el >= tm.totalSec*1000){
      // Auto-complete
      pendingNote = {tid:tm.id, durSec: tm.totalSec};
      notify(t(`«${tm.name}» تمام شد`,`"${tm.nameEn}" done`));
      delete running[tm.id];
      delete running[tm.id+'_paused'];
      openNoteModal(tm.id, tm.totalSec);
      renderCards();
      return;
    }
    refreshCard(tm);
  });

  // pomo tick
  if(pom && pom.started && !pom.paused){
    pom.rem = Math.max(0, pom.total - Math.floor((Date.now()-pom.started)/1000) - (pom.pausedMs||0));
    const el = document.getElementById('pomoTime');
    if(el) el.textContent = fmt(pom.rem);
    updatePomoRing(pom.rem, pom.total);
    if(pom.rem<=0){ notify(t('پومودورو تمام شد','Pomodoro done')); finishPomoCycle(); }
  }

  document.getElementById('liveIndicator').classList.toggle('live', anyLive || !!(pom&&pom.started));
}, 400);

// ─── Notifications ────────────────────────────────────────────────────────────
function notify(msg){
  if('Notification' in window && Notification.permission==='granted')
    new Notification('Timer', {body:msg});
}
function askNotif(){
  if('Notification' in window)
    Notification.requestPermission().then(p=>{ if(p==='granted') document.getElementById('notifBar').style.display='none'; });
}
function checkNotif(){
  const nb = document.getElementById('notifBar');
  if('Notification' in window && Notification.permission!=='granted') nb.style.display='';
  else nb.style.display='none';
}

// ─── Pomodoro ─────────────────────────────────────────────────────────────────
function renderPomoDots(){
  const total = pomoCycles;
  let h='';
  for(let i=0;i<total;i++){
    if(i < pomoCycleDone) h+=`<div class="pomo-dot done"></div>`;
    else if(pom && i===pomoCycleDone) h+=`<div class="pomo-dot active"></div>`;
    else h+=`<div class="pomo-dot"></div>`;
  }
  document.getElementById('pomoDots').innerHTML=h;
  document.getElementById('pomoCycleNum').textContent=pomoCycles;
}
function adjPomoCycle(d){
  pomoCycles = Math.max(1, Math.min(8, pomoCycles+d));
  renderPomoDots();
}
const POMO_CIRC = 2 * Math.PI * 58; // ~364.4
function updatePomoRing(rem, total){
  const pct = total > 0 ? rem/total : 1;
  const offset = POMO_CIRC * (1 - pct);
  const ring = document.getElementById('pomoRingFill');
  if(ring) ring.style.strokeDashoffset = offset;
}
function startPomo(phase){
  pom = {phase, total:POMO[phase], started:Date.now(), rem:POMO[phase], paused:false, pausedMs:0};
  const labels = {work:t('کار','Work'), short:t('استراحت کوتاه','Short break'), long:t('استراحت طولانی','Long break')};
  document.getElementById('pomoBadge').textContent = labels[phase];
  document.getElementById('pomoTime').textContent = fmt(POMO[phase]);
  document.getElementById('pomoRingLabel').textContent = labels[phase];
  document.getElementById('pomoStart').style.display = 'none';
  document.getElementById('pomoRunning').style.display = '';
  document.getElementById('pomoPauseBtn').innerHTML=`⏸ <span>${t('مکث','Pause')}</span>`;
  updatePomoRing(POMO[phase], POMO[phase]);
  renderPomoDots();
}
function togglePomoPause(){
  if(!pom) return;
  if(pom.paused){
    pom.started = Date.now() - ((pom.total - pom.rem)*1000);
    pom.paused = false;
    document.getElementById('pomoPauseBtn').innerHTML=`⏸ <span>${t('مکث','Pause')}</span>`;
  } else {
    pom.paused = true;
    pom.pausedAt = Date.now();
    document.getElementById('pomoPauseBtn').innerHTML=`▶ <span>${t('ادامه','Resume')}</span>`;
  }
}
function finishPomoCycle(){
  pomoCycleDone++;
  if(pomoCycleDone >= pomoCycles){
    pomoCycleDone = 0;
    notify(t('همه چرخه‌های پومودورو تمام شد 🎉','All Pomodoro cycles done 🎉'));
  }
  stopPomo();
}
function stopPomo(){
  pom = null;
  document.getElementById('pomoTime').textContent = '25:00';
  document.getElementById('pomoRingLabel').textContent = t('آماده','Ready');
  document.getElementById('pomoStart').style.display = '';
  document.getElementById('pomoRunning').style.display = 'none';
  document.getElementById('pomoBadge').textContent = t('آماده','Ready');
  updatePomoRing(1,1);
  renderPomoDots();
}

// ─── Ambient Sound ────────────────────────────────────────────────────────────
let ambientGainNode = null;
function stopAllAmbient(){
  ambientNodes.forEach(n=>{ try{n.stop();}catch(e){} });
  ambientNodes = [];
}
function makeNoise(ctx, type, dur){
  const sr=ctx.sampleRate, buf=ctx.createBuffer(1,sr*dur,sr), d=buf.getChannelData(0);
  if(type==='white'){ for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; }
  else if(type==='pink'){
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for(let i=0;i<d.length;i++){
      const w=Math.random()*2-1;
      b0=.99886*b0+w*.0555179; b1=.99332*b1+w*.0750759;
      b2=.96900*b2+w*.1538520; b3=.86650*b3+w*.3104856;
      b4=.55000*b4+w*.5329522; b5=-.7616*b5-w*.0168980;
      d[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)*.11; b6=w*.115926;
    }
  } else if(type==='brown'){
    let last=0;
    for(let i=0;i<d.length;i++){
      d[i]=(last+(.02*(Math.random()*2-1)))/1.02; last=d[i]; d[i]*=3.5;
    }
  }
  return buf;
}
function setAmbient(type){
  document.querySelectorAll('.amb-btn').forEach(b=>b.classList.toggle('on',b.dataset.key===type));
  ambientActive=type;
  stopAllAmbient();
  if(type==='off') return;
  try{
    if(!ambientCtx) ambientCtx=new(window.AudioContext||window.webkitAudioContext)();
    const ctx=ambientCtx;
    if(ctx.state==='suspended') ctx.resume();
    const master=ctx.createGain(); master.gain.value=0.55; master.connect(ctx.destination);
    ambientGainNode=master;

    const conn=(src,dst)=>src.connect(dst);
    const bpf=(f,q)=>{ const n=ctx.createBiquadFilter(); n.type='bandpass'; n.frequency.value=f; n.Q.value=q; return n; };
    const lpf=(f)=>{ const n=ctx.createBiquadFilter(); n.type='lowpass'; n.frequency.value=f; return n; };
    const hpf=(f)=>{ const n=ctx.createBiquadFilter(); n.type='highpass'; n.frequency.value=f; return n; };
    const gain=(v)=>{ const n=ctx.createGain(); n.gain.value=v; return n; };
    const osc=(f,t2)=>{ const n=ctx.createOscillator(); n.frequency.value=f; n.type=t2||'sine'; return n; };
    const ns=(t2,d)=>{ const s=ctx.createBufferSource(); s.buffer=makeNoise(ctx,t2,d); s.loop=true; return s; };

    if(type==='rain'){
      const s=ns('pink',4), f=bpf(2200,.8), f2=hpf(700), g=gain(1.2);
      conn(s,f); conn(f,f2); conn(f2,g); conn(g,master); s.start(); ambientNodes.push(s);
      const s2=ns('brown',4), lp=lpf(200), g2=gain(0.35);
      conn(s2,lp); conn(lp,g2); conn(g2,master); s2.start(); ambientNodes.push(s2);
    } else if(type==='storm'){
      const s=ns('pink',4), bp=bpf(1800,.4), g=gain(2);
      conn(s,bp); conn(bp,g); conn(g,master); s.start(); ambientNodes.push(s);
      const t=ns('brown',8), lp=lpf(110), tg=gain(1);
      const lfo=osc(.25), lg=gain(.4); lfo.connect(lg); lg.connect(tg.gain);
      conn(t,lp); conn(lp,tg); conn(tg,master); t.start(); lfo.start(); ambientNodes.push(t,lfo);
      const s2=ns('pink',6), bp2=bpf(600,2), g2=gain(0.8), lo2=osc(.12), lg2=gain(280);
      lo2.connect(lg2); lg2.connect(bp2.frequency);
      conn(s2,bp2); conn(bp2,g2); conn(g2,master); s2.start(); lo2.start(); ambientNodes.push(s2,lo2);
    } else if(type==='wind'){
      const s=ns('pink',6), bp=bpf(600,2), g=gain(1.4);
      const lfo=osc(.15), lg=gain(320); lfo.connect(lg); lg.connect(bp.frequency);
      conn(s,bp); conn(bp,g); conn(g,master); s.start(); lfo.start(); ambientNodes.push(s,lfo);
      const s2=ns('pink',5), hp=hpf(2000), g2=gain(.4);
      const lfo2=osc(.08), lg2=gain(1500); lfo2.connect(lg2); lg2.connect(hp.frequency);
      conn(s2,hp); conn(hp,g2); conn(g2,master); s2.start(); lfo2.start(); ambientNodes.push(s2,lfo2);
    } else if(type==='white'){
      const s=ns('white',3), lp=lpf(6000), g=gain(.45);
      conn(s,lp); conn(lp,g); conn(g,master); s.start(); ambientNodes.push(s);
    } else if(type==='brown'){
      const s=ns('brown',4), lp=lpf(900), g=gain(2.2);
      conn(s,lp); conn(lp,g); conn(g,master); s.start(); ambientNodes.push(s);
    } else if(type==='fire'){
      const s=ns('brown',4), bp=bpf(400,1.5), g=gain(1.5);
      const lfo=osc(.6), lg=gain(.35); lfo.connect(lg); lg.connect(g.gain);
      conn(s,bp); conn(bp,g); conn(g,master); s.start(); lfo.start(); ambientNodes.push(s,lfo);
      const c=ns('white',2), hp=hpf(3500), cg=gain(.18);
      const lfo2=osc(1.2), lg2=gain(.1); lfo2.connect(lg2); lg2.connect(cg.gain);
      conn(c,hp); conn(hp,cg); conn(cg,master); c.start(); lfo2.start(); ambientNodes.push(c,lfo2);
    } else if(type==='river'){
      // گرگ‌ومیش رودخانه — سه لایه باند‌پاس با LFO کند
      [[800,.9,.09],[1600,1.1,.07],[3000,.7,.05]].forEach(([f,q,lf],i)=>{
        const s=ns('pink',4+i), bp=bpf(f,q), g=gain(.55);
        const lfo=osc(lf), lg=gain(.22); lfo.connect(lg); lg.connect(g.gain);
        conn(s,bp); conn(bp,g); conn(g,master); s.start(); lfo.start(); ambientNodes.push(s,lfo);
      });
      // صدای ریز آب
      const s2=ns('white',3), hp=hpf(4000), g2=gain(.08);
      conn(s2,hp); conn(hp,g2); conn(g2,master); s2.start(); ambientNodes.push(s2);

    } else if(type==='cave'){
      // غار — رزونانس عمیق + بازتاب
      const s=ns('brown',6), lp=lpf(300), g=gain(1.8);
      conn(s,lp); conn(lp,g); conn(g,master); s.start(); ambientNodes.push(s);
      // تک قطره‌های آب
      const pingInterval = setInterval(()=>{
        if(ambientActive!=='cave'){ clearInterval(pingInterval); return; }
        const o=ctx.createOscillator(), og=ctx.createGain();
        o.frequency.value = 600 + Math.random()*400;
        o.type='sine';
        og.gain.setValueAtTime(.18, ctx.currentTime);
        og.gain.exponentialRampToValueAtTime(.0001, ctx.currentTime+1.8);
        o.connect(og); og.connect(master);
        o.start(); o.stop(ctx.currentTime+1.8);
      }, 2500+Math.random()*3000);

    } else if(type==='coffee'){
      // کافه — زمزمه پس‌زمینه + صدای ظروف
      const s=ns('pink',5), lp=lpf(1200), hp=hpf(250), g=gain(.35);
      conn(s,lp); conn(lp,hp); conn(hp,g); conn(g,master); s.start(); ambientNodes.push(s);
      // ملایم‌تر برای کافه
      const s2=ns('brown',4), lp2=lpf(180), g2=gain(.55);
      conn(s2,lp2); conn(lp2,g2); conn(g2,master); s2.start(); ambientNodes.push(s2);
      // کلیک‌های ادواری (ظروف)
      const clickFn=()=>{
        if(ambientActive!=='coffee') return;
        const o=ctx.createOscillator(), og=ctx.createGain();
        o.frequency.value = 1200+Math.random()*800; o.type='square';
        og.gain.setValueAtTime(.06, ctx.currentTime);
        og.gain.exponentialRampToValueAtTime(.0001, ctx.currentTime+.08);
        o.connect(og); og.connect(master);
        o.start(); o.stop(ctx.currentTime+.1);
        setTimeout(clickFn, 3000+Math.random()*5000);
      };
      setTimeout(clickFn, 2000);
    }
  } catch(e){ console.log('Audio error:',e); }
}

// ─── Card rendering ───────────────────────────────────────────────────────────
function dailyTotals(){
  const td=today(), tots={};
  history.filter(h=>h.date===td).forEach(h=>{ tots[h.tid]=(tots[h.tid]||0)+h.dur; });
  timers.forEach(tm=>{ if(isLive(tm.id)) tots[tm.id]=(tots[tm.id]||0)+elapsedMs(tm.id)/1000; });
  return tots;
}
function displayTime(tm){
  const el = elapsedMs(tm.id)/1000;
  if(tm.type==='stopwatch') return fmt(el);
  return fmt(Math.max(0, tm.totalSec-el));
}
function prog(tm){
  const el=elapsedMs(tm.id)/1000;
  if(tm.type==='stopwatch') return Math.min(1, el/(goals[tm.id]||tm.goalSec));
  return Math.min(1, el/tm.totalSec);
}

function cardHTML(tm){
  const live = isLive(tm.id);
  const paused = !live && (running[tm.id+'_paused'] !== undefined);
  const tots = dailyTotals();
  const gs = goals[tm.id]||tm.goalSec;
  const td = tots[tm.id]||0;
  const gp = Math.min(1, td/gs);
  const pr = prog(tm)*100;
  const catLabel = lang==='fa' ? tm.cat : CATS_EN[CATS_FA.indexOf(tm.cat)];
  const typeLabel = tm.type==='countdown' ? t('معکوس','Countdown') : t('کرنومتر','Stopwatch');
  const streak = streaks[tm.id];
  const streakStr = streak && streak.count>=2 ? `🔥 ${streak.count} ${t('روز','d')}` : '';
  const pinned = !!pins[tm.id];
  const cardLaps = laps[tm.id]||[];

  // Control buttons
  let controls = '';
  if(live){
    controls = `
      <button class="btn-play" id="tbp-${tm.id}" onclick='pauseT("${tm.id}")'>
        <span>⏸</span><span>${t('مکث','Pause')}</span>
      </button>
      <button class="btn-ghost" onclick='stopT("${tm.id}")'>${t('توقف+ذخیره','Stop+Save')}</button>
      ${tm.type==='stopwatch'?`<button class="btn-ghost" onclick='addLap("${tm.id}")'>${t('لپ','Lap')}</button>`:''}`;
  } else if(paused){
    controls = `
      <button class="btn-play" id="tbp-${tm.id}" onclick='startT("${tm.id}")'>
        <span>▶</span><span>${t('ادامه','Resume')}</span>
      </button>
      <button class="btn-ghost" onclick='stopT("${tm.id}")'>${t('ذخیره','Save')}</button>
      <button class="btn-ghost" onclick='resetT("${tm.id}")'>${t('ریست','Reset')}</button>`;
  } else {
    controls = `
      <button class="btn-play" id="tbp-${tm.id}" onclick='startT("${tm.id}")'>
        <span>▶</span><span>${t('شروع','Start')}</span>
      </button>
      <button class="btn-ghost" onclick='resetT("${tm.id}")'>${t('ریست','Reset')}</button>`;
  }

  const subLabel = live ? t('در حال اجرا','running') : (paused ? t('مکث','paused') : t('متوقف','stopped'));

  const lapHTML = cardLaps.length ? `
    <div class="t-laps show" id="laps-${tm.id}">
      ${cardLaps.map((l,i)=>`<div class="lap-row"><span class="lap-label">Lap ${i+1}</span><span class="lap-time">${fmt(l.time)} <span style="color:var(--text3);font-size:10px">+${fmt(l.split)}</span></span></div>`).join('')}
    </div>` : '';

  return `
  <div class="t-card${live?' live':''}" id="tc-${tm.id}"
       draggable="true"
       ondragstart='dragStart(event,"${tm.id}")'
       ondragover='dragOver(event,"${tm.id}")'
       ondrop='dragDrop(event,"${tm.id}")'
       ondragend='dragEnd(event)'>
    <div class="t-head">
      <div class="t-meta">
        <div class="t-icon">${tm.emoji}</div>
        <div>
          <div class="t-name">${lang==='fa'?tm.name:(tm.nameEn||tm.name)}</div>
          <div class="t-tags">
            <span class="t-tag">${typeLabel}</span>
            <span class="t-tag">${catLabel}</span>
            ${streakStr?`<span class="t-tag streak">${streakStr}</span>`:''}
          </div>
        </div>
      </div>
      <div style="display:flex;gap:2px;align-items:center">
        <button class="t-pin${pinned?' pinned':''}" onclick='togglePin("${tm.id}")' title="${t('پین','Pin')}">★</button>
        <button class="t-more" onclick='openEdit("${tm.id}")'>···</button>
      </div>
    </div>

    <div class="t-time-row">
      <div class="t-time${live?' live':''}" id="tt-${tm.id}">${displayTime(tm)}</div>
      <div class="t-sub${live?' live':''}">
        <span class="live-dot"></span>
        <span id="tsub-${tm.id}">${subLabel}</span>
      </div>
    </div>

    ${lapHTML}

    <div class="t-prog-wrap">
      <div class="t-prog-track">
        <div class="t-prog-fill" id="tp-${tm.id}" style="width:${pr}%"></div>
      </div>
    </div>

    <div class="t-controls" id="tctrl-${tm.id}">
      ${controls}
    </div>

    <div class="t-goal">
      <div class="t-goal-info">
        <span class="t-goal-label">${t('هدف امروز','Today')}</span>
        <span class="t-goal-val${gp>=1?' met':''}" id="tgv-${tm.id}">${fmt(Math.round(td))} / ${fmt(gs)} ${gp>=1?'✓':''}</span>
      </div>
      <div class="t-goal-bar">
        <div class="t-prog-track"><div class="t-prog-fill" id="tgb-${tm.id}" style="width:${gp*100}%;${gp>=1?'background:var(--green)':''}"></div></div>
      </div>
    </div>
  </div>`;
}

function refreshCard(tm){
  const live=isLive(tm.id);
  const paused = !live && (running[tm.id+'_paused'] !== undefined);
  const ttEl=document.getElementById('tt-'+tm.id);
  const tpEl=document.getElementById('tp-'+tm.id);
  const tsubEl=document.getElementById('tsub-'+tm.id);
  const tgvEl=document.getElementById('tgv-'+tm.id);
  const tgbEl=document.getElementById('tgb-'+tm.id);
  const tcEl=document.getElementById('tc-'+tm.id);
  if(!ttEl) return;
  const pr=prog(tm)*100;
  const tots=dailyTotals();
  const gs=goals[tm.id]||tm.goalSec;
  const td=tots[tm.id]||0;
  const gp=Math.min(1,td/gs);
  ttEl.textContent=displayTime(tm);
  ttEl.className='t-time'+(live?' live':'');
  tpEl.style.width=pr+'%';
  const subLabel = live ? t('در حال اجرا','running') : (paused ? t('مکث','paused') : t('متوقف','stopped'));
  tsubEl.textContent=subLabel;
  tsubEl.parentElement.className='t-sub'+(live?' live':'');
  tcEl.classList.toggle('live',live);
  tgvEl.textContent=`${fmt(Math.round(td))} / ${fmt(gs)} ${gp>=1?'✓':''}`;
  tgvEl.className='t-goal-val'+(gp>=1?' met':'');
  tgbEl.style.width=gp*100+'%';
  tgbEl.style.background=gp>=1?'var(--green)':'var(--text)';

  // Refresh controls
  const ctrlEl=document.getElementById('tctrl-'+tm.id);
  if(ctrlEl){
    let controls='';
    if(live){
      controls=`<button class="btn-play" id="tbp-${tm.id}" onclick='pauseT("${tm.id}")'>⏸ <span>${t('مکث','Pause')}</span></button>
        <button class="btn-ghost" onclick='stopT("${tm.id}")'>${t('توقف+ذخیره','Stop+Save')}</button>
        ${tm.type==='stopwatch'?`<button class="btn-ghost" onclick='addLap("${tm.id}")'>${t('لپ','Lap')}</button>`:''}`;
    } else if(paused){
      controls=`<button class="btn-play" id="tbp-${tm.id}" onclick='startT("${tm.id}")'>▶ <span>${t('ادامه','Resume')}</span></button>
        <button class="btn-ghost" onclick='stopT("${tm.id}")'>${t('ذخیره','Save')}</button>
        <button class="btn-ghost" onclick='resetT("${tm.id}")'>${t('ریست','Reset')}</button>`;
    } else {
      controls=`<button class="btn-play" id="tbp-${tm.id}" onclick='startT("${tm.id}")'>▶ <span>${t('شروع','Start')}</span></button>
        <button class="btn-ghost" onclick='resetT("${tm.id}")'>${t('ریست','Reset')}</button>`;
    }
    ctrlEl.innerHTML=controls;
  }
}

// ─── Pin ──────────────────────────────────────────────────────────────────────
function togglePin(id){
  if(pins[id]) delete pins[id]; else pins[id]=true;
  saveLS(LS_PINS, pins);
  renderCards();

// ─── Drag & Drop ──────────────────────────────────────────────────────────────
function dragStart(e, id){ dragSrc=id; e.currentTarget.classList.add('dragging'); }
function dragEnd(e){ e.currentTarget.classList.remove('dragging'); document.querySelectorAll('.t-card').forEach(c=>c.classList.remove('drag-over')); }
function dragOver(e, id){ e.preventDefault(); if(dragSrc!==id){ document.getElementById('tc-'+id).classList.add('drag-over'); } }
function dragDrop(e, id){
  e.preventDefault();
  if(dragSrc===id) return;
  const srcIdx = timers.findIndex(t=>t.id===dragSrc);
  const dstIdx = timers.findIndex(t=>t.id===id);
  if(srcIdx===-1||dstIdx===-1) return;
  const [removed] = timers.splice(srcIdx,1);
  timers.splice(dstIdx,0,removed);
  saveLS(LS_TIMERS, timers);
  renderCards();
}

// ─── Session Note Modal ───────────────────────────────────────────────────────
function openNoteModal(tid, durSec){
  pendingNote = {tid, durSec};
  const tm = timers.find(t=>t.id===tid);
  if(tm){
    document.getElementById('noteTitle').textContent = t(`یادداشت جلسه: ${tm.name}`, `Session note: ${tm.nameEn||tm.name}`);
    document.getElementById('noteSub').textContent = t(`مدت: ${fmt(durSec)} — چند کلمه درباره این جلسه؟`, `Duration: ${fmt(durSec)} — Any notes for this session?`);
  }
  document.getElementById('noteInput').value = '';
  document.getElementById('noteOverlay').classList.add('open');
}
function saveNote(withNote){
  if(!pendingNote) return;
  const note = withNote ? document.getElementById('noteInput').value.trim() : '';
  saveS(pendingNote.tid, pendingNote.durSec, note);

function renderHistory(){

  if(!history.length){

  }
  el.innerHTML=history.map(h=>`

    </div>
    <span class="hist-dur">${fmt(h.dur)}</span>

function toggleDone(id){ history=history.map(h=>h.id===id?{...h,done:!h.done}:h); saveLS(LS_HISTORY,history); renderHistory(); }
function deleteSession(id){ history=history.filter(h=>h.id!==id); saveLS(LS_HISTORY,history); renderHistory(); renderStats(); renderGoals(); }

// ─── Export ───────────────────────────────────────────────────────────────────
function exportData(){
  if(!history.length){ alert(t('هنوز داده‌ای برای خروجی نیست','No data to export yet')); return; }
  const header = 'Date,Name,Duration (sec),Duration,Category,Note,Done';
  const rows = history.map(h=>`${h.date},"${h.name}","${h.nameEn||h.name}",${h.dur},${fmt(h.dur)},"${h.cat}","${(h.note||'').replace(/"/g,'""')}",${h.done}`);
  const csv = [header,...rows].join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `timer-history-${today()}.csv`;
  a.click();
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function setRange(r, btn){
  statsRange=r;
  document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderStats();
}

function renderStats(){
  let days=[];
  const n = statsRange==='week'?7 : statsRange==='month'?30 : 60;
  const label = statsRange==='week'?t('هفت روز گذشته','Last 7 days') : statsRange==='month'?t('سی روز گذشته','Last 30 days') : t('دو ماه گذشته','Last 60 days');
  const lbl = document.getElementById('chartLabel');
  if(lbl){ lbl.setAttribute('data-fa', statsRange==='week'?'هفت روز گذشته':statsRange==='month'?'سی روز گذشته':'دو ماه گذشته'); lbl.textContent=label; }

  for(let i=n-1;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    const total=history.filter(h=>h.date===k).reduce((a,h)=>a+h.dur,0);
    const fa=['ش','ی','د','س','چ','پ','ج'], en=['Sa','Su','Mo','Tu','We','Th','Fr'];
    days.push({k,total,label:lang==='fa'?fa[d.getDay()]:en[d.getDay()],isToday:k===today()});
  }
  // For month/all show only 14 bars evenly sampled
  let displayDays = days;
  if(days.length > 14){
    const step = Math.ceil(days.length/14);
    displayDays = days.filter((_,i)=>i%step===0 || i===days.length-1);
  }
  const mx=Math.max(...displayDays.map(d=>d.total),1);
  document.getElementById('chartBars').innerHTML=displayDays.map(d=>`
    <div class="chart-col">
      <div class="chart-bar${d.isToday?' today':''}" style="height:${Math.max(3,(d.total/mx)*78)}px"></div>
    </div>`).join('');
  document.getElementById('chartDays').innerHTML=displayDays.map(d=>`<div class="chart-col"><span class="chart-day">${d.label}</span></div>`).join('');

  const total=history.reduce((a,h)=>a+h.dur,0);
  document.getElementById('totalNum').textContent=fmt(total);

  // Best day & avg
  const dayMap={};
  days.forEach(d=>{ if(d.total) dayMap[d.k]=d.total; });
  const vals=Object.values(dayMap);
  const bestDay = vals.length ? fmt(Math.max(...vals)) : '–';
  const avgDay = vals.length ? fmt(Math.round(vals.reduce((a,b)=>a+b,0)/vals.length)) : '–';
  document.getElementById('bestDayVal').textContent=bestDay;
  document.getElementById('avgDayVal').textContent=avgDay;

  const tots=dailyTotals();
  const mx2=Math.max(...timers.map(tm=>tots[tm.id]||0),1);
  document.getElementById('statList').innerHTML=timers.map(tm=>{
    const sec=tots[tm.id]||0;
    const pct=Math.min(100,(sec/mx2)*100);
    return `<div class="stat-row">
      <span class="stat-icon">${tm.emoji}</span>
      <span class="stat-name">${lang==='fa'?tm.name:(tm.nameEn||tm.name)}</span>
      <div class="stat-mini-bar"><div class="stat-mini-fill" style="width:${pct}%"></div></div>
      <span class="stat-dur">${fmt(Math.round(sec))}</span>
    </div>`;
  }).join('');
}

// ─── Goals ────────────────────────────────────────────────────────────────────
function renderGoals(){
  const tots=dailyTotals();
  document.getElementById('goalList').innerHTML=timers.map(tm=>{
    const gs=goals[tm.id]||tm.goalSec;
    const td=tots[tm.id]||0;
    const gp=Math.min(1,td/gs);
    const streak = streaks[tm.id];
    const streakBadge = streak&&streak.count>=2 ? `<span class="streak-badge">🔥 ${streak.count} ${t('روز متوالی','day streak')}</span>` : '';
    return `<div class="goal-card">
      <div class="goal-header">
        <span class="goal-icon">${tm.emoji}</span>
        <span class="goal-name">${lang==='fa'?tm.name:(tm.nameEn||tm.name)}</span>
        ${streakBadge}
        ${gp>=1?`<span class="goal-status">✓ ${t('کامل','Done')}</span>`:''}
      </div>
      <div class="goal-body">
        <div class="goal-presets">
          ${[1800,3600,5400,7200,10800].map(s=>`<button class="dur-btn${gs===s?' on':''}" onclick='setGoal("${tm.id}",${s})'>${fmt(s)}</button>`).join('')}
        </div>
        <div style="display:flex;gap:6px;align-items:center;margin-top:8px">
          <span style="font-size:10px;color:var(--text3);font-weight:500;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap">${t('دستی','Custom')}</span>
          <input type="number" class="m-input" min="1" max="720" placeholder="${t('دقیقه','min')}"
            style="max-width:90px;padding:5px 9px;font-size:12px"
            id="goalManual-${tm.id}"
            value="${![1800,3600,5400,7200,10800].includes(gs)?Math.round(gs/60):''}"
            onchange="setGoalManual('${tm.id}',this.value)"
            onkeydown="if(event.key==='Enter'){setGoalManual('${tm.id}',this.value);this.blur();}">
          <span style="font-size:10px;color:var(--text3)">${t('دقیقه','min')}</span>
        </div>
        <div class="goal-prog-row">
          <span class="goal-prog-label">${t('پیشرفت','Progress')}</span>
          <span class="goal-prog-pct${gp>=1?' met':''}">${Math.round(gp*100)}%</span>
        </div>
        <div class="goal-bar"><div class="goal-bar-fill${gp>=1?' met':''}" style="width:${gp*100}%"></div></div>
        <div class="remind-row">
          <span class="remind-label">🔔</span>
          <input type="time" class="time-inp" value="${reminders[tm.id]||''}" onchange='reminders["${tm.id}"]=this.value;saveLS(LS_REMIND,reminders);renderGoals()'>
          ${reminders[tm.id]?`<button class="x-btn" onclick='delete reminders["${tm.id}"];saveLS(LS_REMIND,reminders);renderGoals()'>✕</button>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}
function setGoal(id,s){ goals[id]=s; saveLS(LS_GOALS,goals); renderGoals(); refreshCard(timers.find(t=>t.id===id)); }
function setGoalManual(id,v){ const s=Math.round(parseFloat(v)*60); if(s>0&&s<=43200){ goals[id]=s; saveLS(LS_GOALS,goals); refreshCard(timers.find(t=>t.id===id)); renderGoals(); } }

function switchTab(id,btn){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));

// ─── Modal ────────────────────────────────────────────────────────────────────
function openAdd(){
  mMode='add';
  mData={id:uid(),name:'',nameEn:'',type:'countdown',totalSec:1500,cat:CATS_FA[0],goalSec:3600,emoji:'⏱'};
  buildModal();
  document.getElementById('overlay').classList.add('open');
}
function openEdit(id){
  mMode='edit';
  mData={...timers.find(t=>t.id===id)};
  buildModal();
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }

document.getElementById('overlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });

function buildModal(){
  document.getElementById('modalTitle').textContent = mMode==='add' ? t('تایمر جدید','New timer') : t('ویرایش','Edit timer');
  document.getElementById('mFa').value=mData.name;
  document.getElementById('mEn').value=mData.nameEn||'';
  document.getElementById('togCd').className='m-tog'+(mData.type==='countdown'?' on':'');
  document.getElementById('togSw').className='m-tog'+(mData.type==='stopwatch'?' on':'');
  document.getElementById('durField').style.display=mData.type==='countdown'?'':'none';
  document.getElementById('emojiGrid').innerHTML=EMOJIS.map(e=>`<button class="e-btn${mData.emoji===e?' on':''}" onclick='pickE("${e}")'>${e}</button>`).join('');
  document.getElementById('durPresets').innerHTML=DURS.map(s=>`<button class="dur-btn${mData.totalSec===s?' on':''}" onclick='pickD(${s})'>${fmt(s)}</button>`).join('');
  document.getElementById('catPresets').innerHTML=CATS_FA.map((c,i)=>`<button class="cat-btn${mData.cat===c?' on':''}" onclick='pickC("${c}")'>${lang==='fa'?c:CATS_EN[i]}</button>`).join('');

  const f=document.getElementById('mFooter');
  if(mMode==='edit'){
    f.innerHTML=`<button class="m-del" onclick='delTimer("${mData.id}")'>${t('حذف','Delete')}</button>
    <button class="m-cancel" onclick='closeModal()'>${t('انصراف','Cancel')}</button>
    <button class="m-save" onclick='saveModal()'>${t('ذخیره','Save')}</button>`;
  } else {
    f.innerHTML=`<button class="m-cancel" onclick='closeModal()'>${t('انصراف','Cancel')}</button>
    <button class="m-save" onclick='saveModal()'>${t('افزودن','Add')}</button>`;
  }
}
function pickE(e){ mData.emoji=e; document.querySelectorAll('.e-btn').forEach(b=>b.classList.toggle('on',b.textContent===e)); }
function pickD(s){ mData.totalSec=s; document.querySelectorAll('.dur-btn').forEach(b=>b.classList.toggle('on',b.textContent===fmt(s))); }
function pickC(c){ mData.cat=c; document.querySelectorAll('.cat-btn').forEach((b,i)=>b.classList.toggle('on',CATS_FA[i]===c)); }
function setMType(tp){
  mData.type=tp;
  document.getElementById('togCd').className='m-tog'+(tp==='countdown'?' on':'');
  document.getElementById('togSw').className='m-tog'+(tp==='stopwatch'?' on':'');
  document.getElementById('durField').style.display=tp==='countdown'?'':'none';
}
function saveModal(){
  const fa=document.getElementById('mFa').value.trim();
  const en=document.getElementById('mEn').value.trim();
  if(!fa&&!en) return;
  mData.name=fa; mData.nameEn=en;
  if(mMode==='add') timers.push({...mData});
  else timers=timers.map(t=>t.id===mData.id?{...mData}:t);
  saveLS(LS_TIMERS, timers);
  closeModal(); renderAll();
}
function delTimer(id){
  timers=timers.filter(t=>t.id!==id);
  delete running[id]; delete running[id+'_paused'];
  saveLS(LS_TIMERS, timers);
  closeModal(); renderAll();
}

// ─── Keyboard shortcuts ───────────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  const active = timers.filter(tm=>isLive(tm.id));
  if(e.code==='Space'){
    e.preventDefault();
    if(active.length) active.forEach(tm=>pauseT(tm.id));
    else {
      const first = sortedTimers()[0];
      if(first) startT(first.id);
    }
  }
  if(e.key==='r'||e.key==='R'){
    if(active.length) active.forEach(tm=>resetT(tm.id));
  }
  if(e.key==='l'||e.key==='L'){
    active.filter(tm=>tm.type==='stopwatch').forEach(tm=>addLap(tm.id));
  }
});

// ─── Render all ───────────────────────────────────────────────────────────────
function renderAll(){
  renderCatFilter(); renderCards(); renderHistory(); renderStats(); renderGoals(); renderPomoDots();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
checkNotif();
renderAll();
</script>
<script>
// ─── Inline Service Worker (single-file PWA) ──────────────────────────────────
if('serviceWorker' in navigator){
  const swCode = `
const CACHE='timer-v1';
const html = location.href;
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.add(html)).then(()=>self.skipWaiting()));
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));
});
self.addEventListener('fetch',e=>{
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match(html))));
});
`;
  const blob = new Blob([swCode],{type:'text/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url, {scope: './'}).catch(()=>{});
}
</script>
